services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trainingagent
      POSTGRES_USER: trainingagent
      POSTGRES_PASSWORD: trainingagent
    ports:
      - "5432:5432"
    volumes:
      - trainingagent-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainingagent -d trainingagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  news:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: news
    environment:
      PORT: "8081"
      NEWS_FEEDS: "https://cointelegraph.com/rss,https://decrypt.co/feed"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  market:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: market
    environment:
      PORT: "8082"
      BINANCE_API_BASE: "https://api.binance.com"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  engine:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: engine
    environment:
      PORT: "8083"
      NEWS_SERVICE_URL: "http://news:8081"
      MARKET_SERVICE_URL: "http://market:8082"
      DATABASE_URL: "postgres://trainingagent:trainingagent@postgres:5432/trainingagent?sslmode=disable"
      SIGNAL_MIN_PROBABILITY: "0.58"
    ports:
      - "8083:8083"
    depends_on:
      - news
      - market
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  evaluator:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: evaluator
    environment:
      PORT: "8084"
      DATABASE_URL: "postgres://trainingagent:trainingagent@postgres:5432/trainingagent?sslmode=disable"
      MARKET_SERVICE_URL: "http://market:8082"
      EVALUATION_HORIZON_MINUTES: "20"
      EVALUATOR_CHECK_INTERVAL_SECONDS: "60"
      EVALUATOR_BATCH_SIZE: "200"
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - market
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  api-gateway:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: api-gateway
    environment:
      PORT: "8080"
      ENGINE_SERVICE_URL: "http://engine:8083"
      MARKET_SERVICE_URL: "http://market:8082"
      EVALUATOR_SERVICE_URL: "http://evaluator:8084"
      SIGNAL_CACHE_SECONDS: "60"
    ports:
      - "8080:8080"
    depends_on:
      - engine
      - evaluator
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  trainingagent-postgres:
